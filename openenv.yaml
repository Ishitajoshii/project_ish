name: circuitrl
description: OpenEnv benchmark for constrained RC circuit tuning with deterministic range-based tasks.
version: 0.1.0

models:
  action: models.CircuitAction
  observation: models.CircuitObservation
  state: models.CircuitState

server:
  app: server.app:app

docker:
  dockerfile: server/Dockerfile

tasks:
  - lp_1khz_budget
  - lp_10khz_budget
  - hp_500hz_budget
  - lp_2khz_low_cost
